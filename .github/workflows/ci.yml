name: Validate Framework

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git tag history (migration check)

      - name: Framework tags consistent with VERSION
        id: tags
        run: bash scripts/validate-tags.sh

      - name: Version sync (VERSION == plugin.json)
        id: version
        run: |
          VERSION=$(cat VERSION)
          PLUGIN=$(jq -r .version .claude-plugin/plugin.json)
          TMPL=$(jq -r .version skills/setup-framework/templates/.claude-plugin/plugin.json)
          ERRORS=0
          if [ "$VERSION" != "$PLUGIN" ]; then
            echo "❌ VERSION ($VERSION) != .claude-plugin/plugin.json ($PLUGIN)"
            ERRORS=$((ERRORS + 1))
          fi
          if [ "$VERSION" != "$TMPL" ]; then
            echo "❌ VERSION ($VERSION) != templates/.claude-plugin/plugin.json ($TMPL)"
            ERRORS=$((ERRORS + 1))
          fi
          if [ "$ERRORS" -gt 0 ]; then exit 1; fi
          echo "✅ Version sync OK: v$VERSION"

      - name: Source-template sync
        id: sync
        run: bash scripts/check-sync.sh

      - name: Migration exists for tag
        id: migration
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV" ]; then
            echo "No previous tag found, skipping migration check"
            exit 0
          fi
          MIGRATION="migrations/${PREV}-to-${TAG}.md"
          if [ ! -f "$MIGRATION" ]; then
            echo "❌ Missing migration file: $MIGRATION"
            exit 1
          fi
          echo "✅ Migration found: $MIGRATION"

      - name: Notify Google Chat
        if: always() && github.event_name == 'push'
        env:
          WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: |
          REF="${GITHUB_REF}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          OVERALL="${{ job.status }}"
          STATUS_ICON=$([[ "$OVERALL" == "success" ]] && echo "✅" || echo "❌")

          # Collect step results
          TAGS_STATUS="${{ steps.tags.outcome }}"
          VERSION_STATUS="${{ steps.version.outcome }}"
          SYNC_STATUS="${{ steps.sync.outcome }}"
          MIGRATION_STATUS="${{ steps.migration.outcome }}"

          format_step() {
            local name="$1" status="$2"
            case "$status" in
              success)  echo "✅ $name" ;;
              failure)  echo "❌ $name" ;;
              skipped)  echo "⏭️ $name (skipped)" ;;
              *)        echo "— $name" ;;
            esac
          }

          CHECKS="$(format_step "Framework tags" "$TAGS_STATUS")
          $(format_step "Version sync" "$VERSION_STATUS")
          $(format_step "Source-template sync" "$SYNC_STATUS")
          $(format_step "Migration exists" "$MIGRATION_STATUS")"

          if [[ "$REF" == refs/tags/v* ]]; then
            TAG="${REF#refs/tags/}"
            VERSION="${TAG#v}"
            # Extract changelog entry for this version
            CHANGES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found && NF{print}" CHANGELOG.md | head -15)
            TEXT="${STATUS_ICON} *Release ${TAG} — claude-code-framework*

          ${CHECKS}

          *Mudanças:*
          ${CHANGES}

          ${RUN_URL}"
          else
            COMMIT_MSG=$(git log -1 --format="%s")
            SHORT_SHA=$(git rev-parse --short HEAD)
            TEXT="${STATUS_ICON} *claude-code-framework* — CI ${OVERALL}

          Commit: \`${SHORT_SHA}\` ${COMMIT_MSG}

          ${CHECKS}

          ${RUN_URL}"
          fi

          # Escape for JSON
          JSON_TEXT=$(echo "$TEXT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"text\": ${JSON_TEXT}}"
