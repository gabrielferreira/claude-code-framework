name: Validate Framework

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Security вЂ” Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact

  trivy:
    name: Security вЂ” Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # needed for git tag history (migration check)

      - name: Framework tags consistent with VERSION
        id: tags
        run: bash scripts/validate-tags.sh

      - name: Version sync (VERSION == plugin.json)
        id: version
        run: |
          VERSION=$(cat VERSION)
          PLUGIN=$(jq -r .version .claude-plugin/plugin.json)
          TMPL=$(jq -r .version skills/setup-framework/templates/.claude-plugin/plugin.json)
          ERRORS=0
          if [ "$VERSION" != "$PLUGIN" ]; then
            echo "вќЊ VERSION ($VERSION) != .claude-plugin/plugin.json ($PLUGIN)"
            ERRORS=$((ERRORS + 1))
          fi
          if [ "$VERSION" != "$TMPL" ]; then
            echo "вќЊ VERSION ($VERSION) != templates/.claude-plugin/plugin.json ($TMPL)"
            ERRORS=$((ERRORS + 1))
          fi
          if [ "$ERRORS" -gt 0 ]; then exit 1; fi
          echo "вњ… Version sync OK: v$VERSION"

      - name: Source-template sync
        id: sync
        run: bash scripts/check-sync.sh

      - name: Test setup simulation
        id: test-setup
        run: bash scripts/test-setup.sh

      - name: Validate skill and agent structure
        id: structure
        run: bash scripts/validate-structure.sh

      - name: Migration exists for tag
        id: migration
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Skip migration check for patch releases (x.y.Z where Z > 0)
          PATCH=$(echo "$TAG" | sed 's/v//' | cut -d. -f3)
          if [ "$PATCH" != "0" ]; then
            echo "вЏ­пёЏ Patch release ($TAG) вЂ” migration not required"
            exit 0
          fi

          PREV=$(git tag --sort=v:refname | grep -B1 "^${TAG}$" | head -1)
          if [ -z "$PREV" ] || [ "$PREV" = "$TAG" ]; then
            echo "No previous tag found, skipping migration check"
            exit 0
          fi
          MIGRATION="migrations/${PREV}-to-${TAG}.md"
          if [ ! -f "$MIGRATION" ]; then
            echo "вќЊ Missing migration file: $MIGRATION"
            exit 1
          fi
          echo "вњ… Migration found: $MIGRATION"

      - name: Notify Google Chat
        if: success() && startsWith(github.ref, 'refs/tags/v')
        env:
          WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          CHANGES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found && NF{print}" CHANGELOG.md \
            | sed 's/^### Adicionado$/рџ†• *Adicionado*/g' \
            | sed 's/^### Alterado$/вњЏпёЏ *Alterado*/g' \
            | sed 's/^### Corrigido$/рџ”§ *Corrigido*/g' \
            | sed 's/^### Removido$/рџ—‘пёЏ *Removido*/g' \
            | sed 's/^- /вЂў /g' \
            | head -25)

          TEXT="рџљЂ *Release ${TAG} вЂ” claude-code-framework*

          ${CHANGES}

          ${RUN_URL}"

          JSON_TEXT=$(echo "$TEXT" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"text\": ${JSON_TEXT}}"
